<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ของขวัญสำหรับคุณ</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background-color: #f0f0f0; overflow: hidden; }
        #scare-button { padding: 20px 40px; font-size: 24px; cursor: pointer; background-color: #ff4757; color: white; border: none; border-radius: 10px; z-index: 10; }
        
        #jumpscare-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: black; z-index: 999; justify-content: center; align-items: center;
        }
        #jumpscare-overlay img { width: 100%; height: 100%; object-fit: cover; }
        
        /* ซ่อนเครื่องเล่น YouTube */
        #youtube-player { position: absolute; top: -9999px; left: -9999px; }

        .shake { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(5px, 5px); }
            50% { transform: translate(-10px, -5px); }
            100% { transform: translate(10px, 5px); }
        }
    </style>
</head>
<body>

    <button id="scare-button">กดเพื่อรับรางวัล! 🎁</button>

    <div id="jumpscare-overlay">
        <img src="https://cms.dmpcdn.com/moviearticle/2020/06/25/d72fa600-b6c8-11ea-8fac-236a281cd6c5_original.jpg" id="ghost-img">
    </div>

    <div id="youtube-player"></div>

    <script>
        let player;
        // โหลด YouTube API
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0',
                width: '0',
                videoId: 'GfTrxgjoAQE', // เช่น https://youtu.be/dQw4w9WgXcQ ID คือ dQw4w9WgXcQ
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            document.getElementById('scare-button').addEventListener('click', () => {
                const overlay = document.getElementById('jumpscare-overlay');
                const ghostImg = document.getElementById('ghost-img');

                overlay.style.display = 'flex';
                ghostImg.classList.add('shake');
                
                // สั่งเล่นเพลงจาก YouTube
                player.seekTo(0); // เริ่มที่วินาทีที่ 0
                player.playVideo();

                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                }

                setTimeout(() => {
                    overlay.style.display = 'none';
                    player.pauseVideo();
                    if (document.fullscreenElement) document.exitFullscreen();
                }, 4000); // แสดงผี 4 วินาที
            });
        }
    </script>
</body>
</html>
