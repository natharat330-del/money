<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ของขวัญสำหรับคุณ</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
            font-family: sans-serif;
            overflow: hidden;
        }

        /* สไตล์ของปุ่ม */
        #scare-button {
            padding: 20px 40px;
            font-size: 24px;
            cursor: pointer;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        #scare-button:hover {
            transform: scale(1.1);
        }

        /* หน้าจอจั๊มสแกร์ (ซ่อนไว้ตอนแรก) */
        #jumpscare-overlay {
            display: none; /* ซ่อนไว้ */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

        #jumpscare-overlay img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* ให้รูปเต็มจอ */
        }

        /* เอฟเฟกต์สั่น */
        .shake {
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            100% { transform: translate(3px, 1px) rotate(-1deg); }
        }
    </style>
</head>
<body>

    <button id="scare-button">กดเพื่อรับรางวัล! 🎁</button>

    <div id="jumpscare-overlay">
        <img src="https://stickershop.line-scdn.net/stickershop/v1/product/26774423/LINEStorePC/main.png?v=1" id="ghost-img">
    </div>

    <audio id="scare-sound" src="https://youtu.be/GfTrxgjoAQE?si=kokJ-wLJjRKNLCDa"></audio>

    <script>
        const button = document.getElementById('scare-button');
        const overlay = document.getElementById('jumpscare-overlay');
        const sound = document.getElementById('scare-sound');
        const ghostImg = document.getElementById('ghost-img');

        button.addEventListener('click', () => {
            // 1. แสดง Overlay
            overlay.style.display = 'flex';
            
            // 2. เล่นเสียง (ปรับระดับเสียงให้ดังสุด)
            sound.volume = 1.0;
            sound.play();

            // 3. เพิ่มเอฟเฟกต์สั่นให้รูปภาพ
            ghostImg.classList.add('shake');

            // (เสริม) กดแล้วให้เข้าสู่โหมด Fullscreen เพื่อความสมจริง
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }

            // 4. ตั้งเวลาปิด (ตัวอย่าง: 3 วินาทีแล้วหายไป)
            setTimeout(() => {
                overlay.style.display = 'none';
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }, 3000);
        });
    </script>
</body>
</html>
